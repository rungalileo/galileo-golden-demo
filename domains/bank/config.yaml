domain:
  name: "bank"
  description: "Bank assistant for online help and customer account support"

galileo:
  project: "denisd-project"
  log_stream: "bank"

# UI configuration
ui:
  app_title: "💰 Online Bank Customer Assistant"
  icon: "💰"
  example_queries:
    - "Can I update my name on my credit card?"
    - "Show me data for for customer C001."

# Model configuration
model:
  default_model: "gemma4"
  temperature: 0.1
  additional_models:
    - "llama3.2"
  hosted_default_model: "gpt-4o"
  hosted_additional_models:
    - "gpt-4o-mini"
    - "gpt-4.1"
    - "gpt-5.2"

# RAG configuration
rag:
  enabled: true
  chunk_size: 1000
  chunk_overlap: 200
  top_k: 3

# Available tools for this domain
tools:
  - "get_customer_info"
  - "delete_customer_record"
  - "search_bank_qa"

# Vector store configuration
vectorstore:
  embedding_model: "nomic-embed-text"

# Demo hallucinations for Galileo observability demos
demo_hallucinations:
  - question: "Can I update my name on my credit card?"
    hallucinated_answer: "Yes, go to Profile -> Card -> Settings and you can update your name in that menu."
    # NOTE: Real answer is unlimited data 
    context:
      - "Unfortunately, updating your name cannot be done online, please contact your Program Administrator."